  const ds=["Montaje estructura","Descarga contenedor","Izaje vigas","Módulos prefab.","Desmontaje grúa torre","Carga maquinaria"];
  const j=[];const t=new Date();
  for(let i=0;i<18;i++){
    const o=Math.floor(Math.random()*14)-3;const d=new Date(t);d.setDate(d.getDate()+o);
    const h=7+Math.floor(Math.random()*10);const c=cr[Math.floor(Math.random()*cr.length)];

    const w=o<0?[0,0,1,8,1]:o===0?[1,2,5,1,0]:[4,4,0,0,1];
    const tw=w.reduce((a,b)=>a+b);let r=Math.random()*tw,si=0;
    for(let k=0;k<w.length;k++){r-=w[k];if(r<=0){si=k;break;}}
    j.push({id:i+1,client:cls[i%cls.length],location:locs[i%locs.length],description:ds[i%ds.length],date:d.toISOString().split("T")[0],time:`${String(h).padStart(2,"0")}:00`,duration:[2,3,4,6,8][i%5],craneId:c.id,craneName:c.name,operator:p?.name||"Sin asignar",status:ss[si],tonnage:[5,10,15,20,25,30][i%6]});
  }
  return j.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
